version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: atlas-postgres
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: ${DB_PASSWORD:-atlas_dev_password}
      POSTGRES_DB: atlas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas"]
      interval: 10s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:latest
    container_name: atlas-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"

  neo4j:
    image: neo4j:5.14-community
    container_name: atlas-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j_password}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  redis:
    image: redis:7-alpine
    container_name: atlas-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: atlas-backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://atlas:${DB_PASSWORD:-atlas_dev_password}@postgres:5432/atlas
      CHROMA_URL: http://chroma:8000
      NEO4J_URI: bolt://neo4j:7687
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_started
      neo4j:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - ../src/backend:/app/src
      - /app/node_modules

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: atlas-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - backend
    volumes:
      - ../src/frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
  chroma_data:
  neo4j_data:
  redis_data: